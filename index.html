            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.warn("Auth token issue, signing in anonymously.", error);
                await signInAnonymously(auth);
            }

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'settings'), (snapshot) => {
                snapshot.docs.forEach(doc => { if(doc.id === 'global') state.exchangeRate = doc.data().exchangeRate || 1500; });
                if(!state.initialLoad) renderUI(false);
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snapshot) => {
                state.products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                state.initialLoad = false;
                renderUI(true);
            });
        };

        // Core Render Function
        const renderUI = (animate = false) => {
            
            // 1. Render Categories
            document.getElementById('categories-container').innerHTML = state.categories.map(cat => {
                const isActive = state.selectedCategory === cat;
                return `
                <button onclick="setCategory('${cat}')" class="whitespace-nowrap px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 border 
                    ${isActive 
                        ? 'bg-brand-600 text-white border-brand-600 shadow-lg shadow-brand-500/30 transform scale-105' 
                        : 'bg-white/50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 border-transparent hover:bg-slate-100 dark:hover:bg-slate-700'}">
                    ${cat}
                </button>
            `}).join('');

            // 2. Filter & Sort
            let filtered = [...state.products];
            if (state.selectedCategory !== 'هەمووی') filtered = filtered.filter(p => p.category === state.selectedCategory);
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
            }
            
            if (state.sortBy === 'price-asc') filtered.sort((a, b) => a.price - b.price);
            else if (state.sortBy === 'price-desc') filtered.sort((a, b) => b.price - a.price);
            else filtered.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            
            // 3. Render Grid
            const grid = document.getElementById('products-grid');
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-24 flex flex-col items-center justify-center text-center reveal-up">
                        <div class="w-32 h-32 mb-6 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center relative">
                            <div class="absolute inset-0 border-4 border-dashed border-slate-200 dark:border-slate-700 rounded-full animate-[spin_10s_linear_infinite]"></div>
                            <i class="fas fa-search text-5xl text-slate-300 dark:text-slate-600"></i>
                        </div>
                        <h3 class="text-2xl font-black mb-2 text-slate-800 dark:text-white">هیچ دەرەنجامێک نەدۆزرایەوە</h3>
                        <p class="text-slate-500 max-w-md">ببوورە، نەمانتوانی کاڵایەک بدۆزینەوە بەو ناوەی بەدوایدا دەگەڕێیت. هەوڵبدە وشەیەکی تر بەکاربهێنیت.</p>
                        <button onclick="document.getElementById('search-input').value=''; document.getElementById('search-input').dispatchEvent(new Event('input'))" class="mt-6 px-6 py-2 bg-brand-50 dark:bg-brand-900/30 text-brand-600 rounded-full font-bold hover:bg-brand-100 transition-colors">پاککردنەوەی گەڕان</button>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, index) => {
                const animDelay = animate ? (index % 12) * 0.05 : 0; 
                const animClass = animate ? 'reveal-up' : '';
                
                const isNew = index < 3 && state.sortBy === 'newest';
                const iqdPrice = (p.price * state.exchangeRate).toLocaleString();
                const displayName = highlightText(p.name, state.searchQuery);
                
                return `
                <div class="product-card ${animClass} bg-white dark:bg-slate-800 rounded-3xl overflow-hidden border border-slate-100 dark:border-slate-700/60 relative group cursor-pointer flex flex-col h-full" style="animation-delay: ${animDelay}s" onclick="openModal('${p.id}')">
                    
                    ${p.isSoldOut ? `<div class="absolute inset-0 z-20 flex items-center justify-center sold-out-overlay rounded-3xl"><div class="bg-red-600/90 text-white px-8 py-2 rounded-xl font-black text-xl transform -rotate-12 border border-white/20 shadow-2xl backdrop-blur-md tracking-widest uppercase">فرۆشراوە</div></div>` : ''}
                    
                    ${!p.isSoldOut && isNew ? `<div class="absolute top-4 left-4 z-10 bg-gradient-to-r from-emerald-400 to-emerald-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span> نوێ</div>` : ''}

                    <div class="product-img-container relative h-64 bg-slate-50/50 dark:bg-slate-900/50 p-6 flex items-center justify-center overflow-hidden">
                        <!-- Abstract shape behind image -->
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                            <div class="w-32 h-32 bg-brand-500/10 rounded-full blur-2xl"></div>
                        </div>
                        
                        <img src="${p.image || 'https://placehold.co/400'}" class="max-h-full max-w-full object-contain transition-all duration-700 group-hover:scale-110 drop-shadow-xl relative z-10" loading="lazy">
                        
                        <div class="absolute top-4 right-4 z-10 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md text-[11px] font-bold px-3 py-1.5 rounded-full text-slate-700 dark:text-slate-300 shadow-sm border border-slate-200/50 dark:border-slate-600/50">${p.quality}</div>
                    </div>
                    
                    <div class="product-content p-6 flex flex-col flex-grow bg-white dark:bg-slate-800 relative z-10">
                        <div class="text-[11px] text-brand-600 dark:text-brand-400 font-bold mb-2 tracking-wider">${p.category}</div>
                        <h3 class="font-bold text-lg mb-4 line-clamp-2 text-slate-800 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors leading-snug" dir="auto">${displayName}</h3>
                        
                        <div class="mt-auto pt-4 flex justify-between items-end border-t border-slate-100 dark:border-slate-700/50">
                            <div>
                                <span class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter" dir="ltr"><span class="text-xl text-brand-500 mr-0.5">$</span>${p.price}</span>
                                <span class="text-xs font-bold text-slate-400 block mt-1" dir="ltr">${iqdPrice} IQD</span>
                            </div>
                            <button class="${p.isSoldOut ? 'bg-slate-100 text-slate-400 dark:bg-slate-800' : 'bg-slate-900 dark:bg-brand-600 text-white hover:bg-brand-600 dark:hover:bg-brand-500'} w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-md transform group-hover:scale-110 group-hover:-rotate-3">
                                <i class="fas ${p.isSoldOut ? 'fa-ban' : 'fa-arrow-left'} text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
        };

        // Event Listeners for UI
        window.setCategory = (cat) => { state.selectedCategory = cat; renderUI(true); };
        
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', e => { 
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                state.searchQuery = e.target.value; 
                renderUI(true); 
            }, 150);
        });
        
        document.getElementById('sort-select').addEventListener('change', e => { state.sortBy = e.target.value; renderUI(true); });

        // Share API
        window.shareProduct = (id, name, price) => {
            const iqd = (price * state.exchangeRate).toLocaleString();
            if (navigator.share) {
                navigator.share({
                    title: 'ئارش فۆن',
                    text: `سەیری ئەم کاڵایە بکە لە ئارش فۆن:\n${name}\nنرخ: $${price} (${iqd} دینار)\n\n`,
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("ببورە، ئەم تایبەتمەندییە لە ئامێرەکەتدا کارناکات.");
            }
        };

        // Futuristic Modal
        window.openModal = (id) => {
            const p = state.products.find(x => x.id === id);
            if (!p) return;
            const iqdPrice = (p.price * state.exchangeRate).toLocaleString();
            const msg = encodeURIComponent(`سڵاو ئارش فۆن، دەمەوێت ئەم کاڵایە داوا بکەم:\n\nکۆد: ${p.id.substring(0,5)}\nناو: ${p.name}\nنرخ: $${p.price} (${iqdPrice} دینار)`);
            
            const modal = document.createElement('div');
            modal.id = 'product-modal';
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-0 sm:p-6 bg-slate-900/60 backdrop-blur-md opacity-0 transition-opacity duration-300';
            
            modal.innerHTML = `
                <div class="bg-white dark:bg-slate-900 w-full h-full sm:h-auto sm:max-h-[90vh] sm:rounded-[2.5rem] sm:max-w-5xl overflow-hidden shadow-2xl flex flex-col md:flex-row relative transform translate-y-10 scale-95 transition-all duration-500 ease-out" id="modal-content">
                    
                    <!-- Controls -->
                    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-20 flex gap-2">
                        <button onclick="closeModal()" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/50 dark:bg-black/30 backdrop-blur-lg rounded-full flex items-center justify-center text-slate-800 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors shadow-sm">
                            <i class="fas fa-times text-lg"></i>
                        </button>
                    </div>
                    <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-20">
                        <button onclick="shareProduct('${p.id}', '${p.name.replace(/'/g, "\\'")}', '${p.price}')" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/50 dark:bg-black/30 backdrop-blur-lg rounded-full flex items-center justify-center text-brand-600 dark:text-brand-400 hover:bg-brand-50 dark:hover:bg-brand-900/50 transition-colors shadow-sm">
                            <i class="fas fa-share-nodes text-lg"></i>
                        </button>
                    </div>

                    <!-- Image Section (Glassy) -->
                    <div class="md:w-1/2 h-[40vh] md:h-auto bg-slate-50 dark:bg-slate-800/50 p-12 flex items-center justify-center relative overflow-hidden group">
                        ${p.isSoldOut ? `<div class="absolute inset-0 z-10 flex items-center justify-center sold-out-overlay"><div class="bg-red-600/90 text-white px-10 py-3 rounded-2xl font-black text-2xl transform -rotate-12 border border-white/20 shadow-2xl tracking-widest">فرۆشراوە</div></div>` : ''}
                        
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-gradient-to-tr from-brand-100 to-purple-100 dark:from-brand-900/20 dark:to-purple-900/20 rounded-full blur-3xl opacity-50 group-hover:scale-110 transition-transform duration-700"></div>
                        
                        <img src="${p.image}" class="max-w-full max-h-full object-contain drop-shadow-[0_20px_30px_rgba(0,0,0,0.2)] relative z-10 transform group-hover:scale-105 transition-transform duration-700">
                    </div>
                    
                    <!-- Content Section -->
                    <div class="md:w-1/2 p-8 sm:p-10 flex flex-col h-[60vh] md:h-auto overflow-y-auto no-scrollbar bg-white dark:bg-slate-900 relative">
                        <div class="flex flex-wrap gap-2 mb-6">
                            <span class="bg-brand-50 text-brand-700 dark:bg-brand-900/30 dark:text-brand-300 text-xs font-bold px-4 py-1.5 rounded-full border border-brand-100 dark:border-brand-800/50"><i class="fas fa-layer-group mr-1.5"></i>${p.category}</span>
                            <span class="bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300 text-xs font-bold px-4 py-1.5 rounded-full border border-slate-200 dark:border-slate-700">${p.quality}</span>
                        </div>
                        
                        <h2 class="text-3xl sm:text-4xl font-black mb-6 text-slate-900 dark:text-white leading-tight tracking-tight">${p.name}</h2>
                        
                        <!-- Price Block -->
                        <div class="flex flex-col bg-slate-50 dark:bg-slate-800/50 p-6 rounded-3xl mb-8 border border-slate-100 dark:border-slate-700/50">
                            <div class="text-xs text-slate-500 font-bold mb-1 uppercase tracking-widest">نرخی کۆتایی</div>
                            <div class="text-5xl font-black text-brand-600 dark:text-brand-400 tracking-tighter flex items-start gap-1" dir="ltr">
                                <span class="text-2xl mt-1">$</span>${p.price}
                            </div>
                            <div class="text-lg font-bold text-slate-400 mt-1" dir="ltr">${iqdPrice} IQD</div>
                        </div>
                        
                        <!-- Description Block -->
                        <div class="mb-10 flex-grow">
                            <h4 class="text-lg font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2"><i class="fas fa-align-right text-brand-500"></i> تایبەتمەندییەکان</h4>
                            <p class="text-slate-600 dark:text-slate-400 whitespace-pre-line text-sm leading-loose">${p.description || 'بێ زانیاری.'}</p>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="space-y-3 mt-auto pt-6 border-t border-slate-100 dark:border-slate-800">
                            <div class="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">داواکردنی خێرا</div>
                            <a href="https://wa.me/${CONTACT_NUMBER}?text=${msg}" target="_blank" class="${p.isSoldOut ? 'opacity-50 pointer-events-none' : 'hover:-translate-y-1 hover:shadow-xl hover:shadow-[#25D366]/20'} relative overflow-hidden group w-full flex items-center justify-center gap-3 bg-[#25D366] text-white font-bold py-4 rounded-2xl transition-all duration-300">
                                <div class="absolute inset-0 w-full h-full bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                                <i class="fab fa-whatsapp text-2xl"></i> وەتسئەپ (WhatsApp)
                            </a>
                            <div class="grid grid-cols-2 gap-3">
                                <a href="viber://chat?number=+${CONTACT_NUMBER}" target="_blank" class="${p.isSoldOut ? 'opacity-50 pointer-events-none' : 'hover:-translate-y-1 hover:shadow-lg hover:shadow-[#7360F2]/20'} flex items-center justify-center gap-2 bg-[#7360F2] text-white font-bold py-3.5 rounded-2xl transition-all duration-300">
                                    <i class="fab fa-viber text-xl"></i> ڤایبەر
                                </a>
                                <a href="tg://resolve?phone=${CONTACT_NUMBER}" target="_blank" class="${p.isSoldOut ? 'opacity-50 pointer-events-none' : 'hover:-translate-y-1 hover:shadow-lg hover:shadow-[#0088cc]/20'} flex items-center justify-center gap-2 bg-[#0088cc] text-white font-bold py-3.5 rounded-2xl transition-all duration-300">
                                    <i class="fab fa-telegram-plane text-xl"></i> تەلەگرام
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
            
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                const content = document.getElementById('modal-content');
                content.classList.remove('translate-y-10', 'scale-95');
            });

            window.closeModal = () => {
                modal.classList.add('opacity-0');
                const content = document.getElementById('modal-content');
                content.classList.add('translate-y-10', 'scale-95');
                setTimeout(() => {
                    modal.remove();
                    document.body.style.overflow = '';
                }, 300);
            };

            modal.addEventListener('click', (e) => {
                if (e.target === modal) window.closeModal();
            });
        };

        window.addEventListener('DOMContentLoaded', initFirebase);
    </script>
</body>
</html>
